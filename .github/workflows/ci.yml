name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -v ./...

  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Checkout MaaEnd test data
        uses: actions/checkout@v4
        with:
          repository: MaaEnd/MaaEnd
          path: MaaEnd
          sparse-checkout: assets/resource/pipeline,assets/tasks
      - name: Build
        run: go build -o install/pipeline-maxhit .
      - name: Regression test
        run: bash test_regression.sh MaaEnd
